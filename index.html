<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
:root{--nav-h:60px;--rc:#9ca3af;--rg:#9ca3af55;--ra:#6b7280;--bg:#0a0a0f;--sf:rgba(255,255,255,0.03);--sf2:rgba(255,255,255,0.06);--tx:#e2e8f0;--td:#64748b}
html,body{height:100dvh;width:100%;overflow:hidden;background:#0a0a0f;color:var(--tx);font-family:'Rajdhani',sans-serif}
#app{width:100%;max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:#0a0a0f;position:relative}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:floatP linear infinite}
@keyframes floatP{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) scale(1);opacity:0}}
.hdr-wrap{flex-shrink:0;width:100%;background:#0a0a0f;padding:16px 20px 12px 32px;z-index:100}
.hdr{background:transparent}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.pname{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--rc);text-shadow:0 0 20px var(--rg);letter-spacing:3px}
.gbtn{background:none;border:none;width:43px;height:43px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:var(--rc);opacity:.8}
.xpbar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.xpfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ra),var(--rc));box-shadow:0 0 8px var(--rg);transition:width .6s}
.scroll-area{flex:1;width:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h, 60px) + env(safe-area-inset-bottom))}
.nav{position:fixed;bottom:0;left:0;right:0;background:#0a0a0f;display:flex;z-index:200;border-top:1px solid rgba(255,255,255,0.06);padding-bottom:env(safe-area-inset-bottom)}
.nbtn{flex:1;padding:10px 0;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--td);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:color .2s}
.nbtn.on{color:var(--rc)}
.nicon{font-size:20px}
.tab{padding:16px 16px 0;position:relative;z-index:1}
.card{background:var(--sf);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--rc),transparent);opacity:.4}
.ctitle{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--rc);text-transform:uppercase;margin-bottom:12px}
.qi{background:var(--sf2);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;margin-bottom:8px}
.qi.done{border-color:var(--rc)}
.qhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.qname{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.qrow{display:flex;align-items:center;gap:10px}
.qbar{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.qfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ra),var(--rc));transition:width .4s}
.qfill.done{background:linear-gradient(90deg,#16a34a,#4ade80);box-shadow:0 0 6px #4ade8088}
.qfill.over{background:linear-gradient(90deg,#d97706,#f59e0b);box-shadow:0 0 6px #f59e0b88}
.qxp{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--rc);min-width:50px;text-align:right}
.qinrow{display:flex;gap:8px;margin-top:8px}
.qin{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;opacity:.8}
.qbtn{background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 14px;color:var(--rc);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:11px}
.xpfloat{position:fixed;pointer-events:none;z-index:800;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--rc);text-shadow:0 0 16px var(--rg),0 0 32px var(--rg);animation:fup 2.2s ease-out forwards;left:50%;transform:translateX(-50%);white-space:nowrap}
@keyframes fup{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}20%{opacity:1;transform:translateX(-50%) translateY(-20px) scale(1.2)}100%{opacity:0;transform:translateX(-50%) translateY(-120px) scale(0.8)}}
.warn{background:#ef444411;border:1px solid #ef444466;border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#ef4444}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0d0d18;border:1px solid var(--rc);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;padding:24px 16px}
.mtitle{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--rc);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.mlbl{font-size:12px;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.msec{margin-bottom:20px}
.min{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:10px 14px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;margin-bottom:8px;opacity:.8}
.mbtn{flex:1;padding:12px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase}
.mprim{background:rgba(255,255,255,0.05);border:1px solid var(--rc);color:var(--rc)}
.mdng{background:#ef444411;border:1px solid #ef444466;color:#ef4444}
.mcan{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--td)}
.mrow{display:flex;gap:8px}
.addbtn{background:rgba(255,255,255,0.03);border:1px solid var(--rc);border-radius:8px;padding:5px 12px;color:var(--rc);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;opacity:.8}
.addform{background:var(--sf);border:1px dashed var(--rc);border-radius:10px;padding:14px;margin-top:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ff{grid-column:1/-1}
.fin{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;opacity:.8}
.fsel{width:100%;background:#0d0d18;border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none}
.fck{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--td)}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.schr{margin-bottom:12px}
.schn{display:flex;justify-content:space-between;font-size:13px;font-weight:600;letter-spacing:1px;color:var(--tx);margin-bottom:5px}
.schlvl{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--rc)}
.schb{height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.schf{height:100%;border-radius:4px;transition:width .6s}
.rpath{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.rnode{display:flex;flex-direction:column;align-items:center;gap:4px}
.rcirc{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;border:2px solid;transition:all .3s}
.rname{font-size:9px;letter-spacing:1px;text-transform:uppercase}
.rconn{flex:1;height:2px;margin:0 4px;margin-bottom:16px}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wday{display:flex;flex-direction:column;align-items:center;gap:3px}
.wdlbl{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:1px}
.wddot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Orbitron',sans-serif}
.ruov{position:fixed;inset:0;z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.97)}
.ruparts{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.rupart{position:absolute;border-radius:50%;animation:rurise linear infinite;opacity:0}
.rucont{text-align:center;z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px}
.ruevol{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:5px;color:var(--rc);text-transform:uppercase;opacity:0.6;margin-bottom:8px}
.rurank{font-family:'Orbitron',sans-serif;font-size:96px;font-weight:900;color:var(--rc);text-shadow:0 0 20px var(--rg);animation:ruglitch 3s ease-in-out infinite;position:relative;line-height:1}
.rurank::before{content:attr(data-r);position:absolute;top:0;left:0;width:100%;height:100%;color:#ef4444;animation:ruglitchA 3s ease-in-out infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%);opacity:0}
.rurank::after{content:attr(data-r);position:absolute;top:0;left:0;width:100%;height:100%;color:#4ade80;animation:ruglitchB 3s ease-in-out infinite;clip-path:polygon(0 60%,100% 60%,100% 100%,0 100%);opacity:0}
.rulabel{font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:6px;color:var(--rc);text-transform:uppercase;opacity:0.9}
.ruprev{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;color:#334155;text-transform:uppercase;position:absolute;bottom:80px}
.rudis{margin-top:32px;background:rgba(255,255,255,0.04);border:1px solid var(--rc);border-radius:8px;padding:12px 32px;color:var(--rc);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase}
@keyframes rurise{0%{transform:translateY(0) scale(1);opacity:0}15%{opacity:1}85%{opacity:0.5}100%{transform:translateY(-100vh) scale(0.3);opacity:0}}
@keyframes ruglitch{0%,70%,100%{transform:none}72%{transform:translate(-4px,0) skewX(-2deg)}74%{transform:translate(4px,0) skewX(2deg)}76%{transform:translate(-2px,0)}78%{transform:none}80%{transform:translate(3px,1px) skewX(-1deg)}82%{transform:none}}
@keyframes ruglitchA{0%,70%,100%{transform:none;opacity:0}72%{transform:translate(-6px,0);opacity:0.8}74%{transform:translate(6px,0);opacity:0.6}78%{transform:none;opacity:0}}
@keyframes ruglitchB{0%,70%,100%{transform:none;opacity:0}74%{transform:translate(5px,0);opacity:0.7}77%{transform:translate(-3px,0);opacity:0.5}79%{transform:none;opacity:0}}
.sqcard{background:linear-gradient(135deg,rgba(239,68,68,0.08),rgba(220,38,38,0.04));border:1px solid #ef444444;border-radius:10px;padding:12px;margin-bottom:8px}
.sq-urgent{animation:urgentPulse 1s ease-in-out infinite}
@keyframes urgentPulse{0%,100%{box-shadow:0 0 0 0 #ef444444}50%{box-shadow:0 0 0 6px #ef444400}}
.sqbar{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin:6px 0}
.sqbarfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#991b1b,#ef4444);transition:width .4s}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--rc),transparent);margin:8px 0 16px;opacity:.3}
.prestige-badge{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:2px;color:#a855f7;text-shadow:0 0 12px #a855f766;display:flex;align-items:center;gap:5px;white-space:nowrap;position:absolute;left:50%;transform:translateX(-50%)}
.puov{position:fixed;inset:0;z-index:950;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.97)}
.pubg{position:absolute;inset:0;background:radial-gradient(ellipse at center,#1a0533 0%,#0a0a0f 70%);animation:pubgPulse 3s ease-in-out infinite}
.puparts{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.pupart{position:absolute;border-radius:50%;animation:purise linear infinite;opacity:0}
.pustars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.pustar{position:absolute;width:2px;height:2px;border-radius:50%;background:#a855f7;animation:putwinkle linear infinite}
.pucont{text-align:center;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px}
.puatom{font-size:72px;line-height:1;animation:puatomGlitch 3s ease-in-out infinite}
.pubadge{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:#a855f7;letter-spacing:4px;text-shadow:0 0 30px #a855f7;animation:pubadgePulse 2s ease-in-out infinite}
.puline{position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#a855f7,transparent);animation:pulineSlide 2.5s ease-in-out infinite}
.pudis{margin-top:32px;background:rgba(168,85,247,0.08);border:1px solid #a855f7;border-radius:8px;padding:12px 32px;color:#a855f7;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase}
@keyframes pubgPulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes purise{0%{transform:translateY(0);opacity:0}15%{opacity:1}85%{opacity:.5}100%{transform:translateY(-100vh);opacity:0}}
@keyframes putwinkle{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.5)}100%{opacity:0;transform:scale(0)}}
@keyframes puatomGlitch{0%,65%,100%{transform:none;filter:none}67%{transform:translate(-4px,0);filter:hue-rotate(90deg) brightness(1.5)}69%{transform:translate(4px,0);filter:hue-rotate(-90deg)}71%{transform:translate(-2px,0);filter:none}73%{transform:none}75%{transform:translate(3px,-2px);filter:hue-rotate(60deg) brightness(1.3)}77%{transform:none;filter:none}}
@keyframes pubadgePulse{0%,100%{text-shadow:0 0 20px #a855f7;opacity:.85}50%{text-shadow:0 0 40px #a855f7,0 0 80px #a855f744;opacity:1}}
@keyframes pulineSlide{0%{transform-origin:center;transform:scaleX(0);opacity:0}50%{transform:scaleX(1);opacity:1}100%{transform:scaleX(0);opacity:0}}
</style>
</head>

const getRank    = xp => { for(let i=RANKS.length-1;i>=0;i--)if(xp>=RANKS[i].xpRequired)return RANKS[i]; return RANKS[0]; };
const getNext    = id => { const i=RANKS.findIndex(r=>r.id===id); return i<RANKS.length-1?RANKS[i+1]:null; };

// Progression des objectifs par rang (linéaire E->S)
const RANK_BASES = {
  push:    [30, 44, 58,  72,  86,  100],
  abs:     [60, 88, 116, 144, 172, 200],
  squats:  [15, 22, 29,  36,  43,  50],
  reading: [10, 14, 18,  22,  26,  30],
  run:     [5,  7,  9,   11,  13,  15],
};

// XP requis pour chaque Ascension (×2 à chaque fois, base = XP rang S)
function getAscensionXpRequired(prestigeLevel){
  // A1 = 141000, A2 = 282000, A3 = 564000...
  const BASE = 141000;
  return Math.round(BASE * Math.pow(2, prestigeLevel - 1));
}

function getRankBase(objId, rankIdx, prestige){
  const base = RANK_BASES[objId]?.[rankIdx] ?? (DEFS.find(o=>o.id===objId)?.base ?? 0);
  if(!prestige||prestige===0)return base;
  // Au rang S : base rang S × 1.2^prestige
  const sBase = RANK_BASES[objId]?.[5] ?? base;
  return Math.round(sBase * Math.pow(1.2, prestige));
}

const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];
const MAX_PRESTIGE = 10;
const getTarget  = base => base; // pas de scaling rang pour l'instant
const todayStr   = () => { const d=new Date(); const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0"); return y+"-"+m+"-"+day; };
const wkStr      = (d=new Date()) => {
  // Semaine ISO : commence le lundi
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=dt.getUTCDay()||7; // dimanche=7
  dt.setUTCDate(dt.getUTCDate()+4-day); // jeudi de la semaine ISO
  const yearStart=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  const wk=Math.ceil(((dt-yearStart)/86400000+1)/7);
  return dt.getUTCFullYear()+"-W"+String(wk).padStart(2,"0");
};
const sortStat   = arr => [...arr].sort((a,b)=>STATS.indexOf(a.stat)-STATS.indexOf(b.stat));
const xpForLvl   = l => Math.round(100*Math.pow(2,l));
const totForLvl  = l => { let t=0; for(let i=0;i<l;i++)t+=xpForLvl(i); return t; };
const getLvl     = xp => { let l=0; while(xp>=totForLvl(l+1))l++; return l; };

function calcXp(obj,total){
  if(!obj||total<=0)return 0;
  if(obj.binary){return total>=obj.base?(obj.binaryXp||50):0;}
  const t=obj.base;
  if(total<=t)return total*obj.xpPer;
  return t*obj.xpPer+(total-t)*obj.xpPer*1.5;
}

function pickRandomSq(usedIds){
  const stats=["Force","Esprit","Endurance","Vitalite"];
  const stat=stats[Math.floor(Math.random()*4)];
  const avail=(SP[stat]||[]).filter(t=>!usedIds.includes(t.id));
  if(avail.length===0){
    for(const s of stats.filter(x=>x!==stat)){
      const a=(SP[s]||[]).filter(t=>!usedIds.includes(t.id));
      if(a.length>0)return {...a[Math.floor(Math.random()*a.length)],stat:s};
    }
    return null;
  }
  return {...avail[Math.floor(Math.random()*avail.length)],stat};
}

function buildState(){
  const saved=loadState();
  if(!saved)return IMPORTED;
  return {
    ...IMPORTED,
    ...saved,
    objectives:DEFS,
    specialQuests:saved.specialQuests||[],
    stats:saved.stats||IMPORTED.stats,
    statXp:saved.statXp||IMPORTED.statXp,

    totalXp:Math.max(saved.totalXp||0, IMPORTED.totalXp),

}

function App(){
  const [state,setState]   = useState(()=>{
    const base=buildState();
    // Auto-init quete speciale si aucune active
    const now=Date.now();
    const sqs=base.specialQuests||[];
    const hasActive=sqs.find(q=>!q.completedAt&&now<q.expiresAt);
    const hasRecent=sqs.find(q=>q.completedAt&&(now-q.completedAt)<86400000);
    if(!hasActive&&!hasRecent){
      const tpl=pickRandomSq(sqs.map(q=>q.id));
      if(tpl){
        const sq={...tpl,sqid:"sq_"+now,progress:0,startedAt:now,expiresAt:now+tpl.days*86400000,completedAt:null};
        return {...base,specialQuests:[...sqs.filter(q=>q.completedAt),sq]};
      }
    }
    return base;
  });
  const [tab,setTab]       = useState("home");
  const [rankUp,setRankUp] = useState(null);
  const [prestigeUp,setPrestigeUp] = useState(null);
  const [floats,setFloats] = useState([]);
  const [showSet,setShowSet]       = useState(false);
  const [confirmReset,setConfirmReset] = useState(false);
  const [wkOff,setWkOff]  = useState(0);
  const inputs = useRef({});
  const walkTargetRef = useRef(state.walkTarget||0);
  // Sync ref from state on mount (after reload)
  useEffect(()=>{ walkTargetRef.current=state.walkTarget||0; },[]);

  // Persistance
  useEffect(()=>{ saveState(state); },[state]);

  // Penalite jours manques (une seule fois au montage)
  useEffect(()=>{
    const t=todayStr();
    if(state.lastActiveDay&&state.lastActiveDay!==t){
      const diff=Math.round((new Date(t)-new Date(state.lastActiveDay))/86400000);
      if(diff>=2)setState(s=>({...s,totalXp:Math.max(0,s.totalXp-diff*10),streak:0}));
    }
  },[]);

  // Penalite hier incomplet : -200 XP -200 Discipline (une seule fois par jour)
  useEffect(()=>{
    const t=todayStr();
    if(state.penaltyDay===t)return; // déjà appliquée aujourd'hui
    const yesterday=new Date(t);yesterday.setDate(yesterday.getDate()-1);
    const yk=(() => {const d=yesterday;const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+day;})();
    const yLog=state.dailyLog[yk]||{};
    const reqObjs=(state.objectives||DEFS).filter(o=>!o.optional&&o.daily&&(!o.startDate||o.startDate<=yk));
    const yesterdayComplete=reqObjs.every(o=>(yLog[o.id]||0)>=o.base);
    if(!yesterdayComplete&&state.lastActiveDay&&yk>=state.lastActiveDay.slice(0,10)){
      // Hier était un jour actif (on avait des logs) mais incomplet
      const hadActivity=Object.keys(yLog).length>0;
      if(hadActivity){
        setState(s=>{
          const sx={...s.statXp,Discipline:Math.max(0,(s.statXp.Discipline||0)-200)};
          return {...s,totalXp:Math.max(0,s.totalXp-200),statXp:sx,stats:{...s.stats,Discipline:getLvl(sx.Discipline)},penaltyDay:t};
        });
      }
    } else if(yesterdayComplete){
      // Hier complet, on marque quand même le jour pour ne pas retester
      setState(s=>({...s,penaltyDay:t}));
    }
  },[]);

  // ─── CALCULS DERIVES (dans l'ordre, sans circularite) ──────────────────

  const today = todayStr();
  const wk    = wkStr();
  const objs  = state.objectives||DEFS;
  const tLog  = state.dailyLog[today]||{};
  const wLog  = state.weeklyLog[wk]||{};
  const prestige = state.prestige||0;

  const effectiveXp = state.totalXp;
  const rank     = getRank(effectiveXp);
  const nextRank = getNext(rank.id);
  const ri       = RANKS.findIndex(r=>r.id===rank.id);

  // 5. Progression XP dans le rang
  const xpInRank = effectiveXp - rank.xpRequired;
  const xpToNext = nextRank ? nextRank.xpRequired - rank.xpRequired : 1;
  const rankPct  = nextRank ? Math.min(100,(xpInRank/xpToNext)*100) : 100;

  // 5b. Prestige disponible : rang S atteint + XP max du rang S
  const S_RANK = RANKS[RANKS.length-1];
  const ASCENSION_XP_NEEDED = prestige > 0 ? getAscensionXpRequired(prestige + 1) : getAscensionXpRequired(1);
  const ASCENSION_XP_START  = prestige > 0 ? getAscensionXpRequired(prestige) : S_RANK.xpRequired;
  const prestigeAvailable = prestige < MAX_PRESTIGE && !nextRank && effectiveXp >= ASCENSION_XP_NEEDED;

  // 6. XP du jour (journalières uniquement, pas l'hebdo)
  const todayXp = Object.entries(tLog).reduce((s,[id,a])=>{
    const o=objs.find(x=>x.id===id); return s+(o?calcXp(o,a):0);
  },0);

  // 7. Quetes journalieres obligatoires toutes faites ?
  const reqDailyObjs  = objs.filter(o=>!o.optional&&o.daily);
  // Quêtes actives pour un jour donné (exclut les quêtes ajoutées après ce jour)
  const activeOn = (day) => reqDailyObjs.filter(o=>!o.startDate||o.startDate<=day);
  const allDailyDone  = reqDailyObjs.every(o=>(tLog[o.id]||0)>=getRankBase(o.id,ri,prestige));

  // 8. Streak : calculé depuis dailyLog mais ne descend jamais sous le streak sauvegardé si hier était complet
  const computedStreak = (()=>{
    let streak=0, d=new Date(today);
    for(let i=0;i<365;i++){
      const dk=d.toISOString().slice(0,10);
      const log=state.dailyLog[dk]||{};
      if(!activeOn(dk).every(o=>(log[o.id]||0)>=o.base))break;
      streak++; d.setDate(d.getDate()-1);
    }
    // Si aujourd'hui est incomplet, le streak "en cours" = streak des jours passés
    // On prend le max entre ce qui est calculé et le streak sauvegardé
    // pour éviter de perdre le streak affiché pendant la journée
    const yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
    const yk=yesterday.toISOString().slice(0,10);
    const yesterdayLog=state.dailyLog[yk]||{};
    const yesterdayDone=activeOn(yk).every(o=>(yesterdayLog[o.id]||0)>=o.base);
    // Si hier était complet, on affiche au moins le streak sauvegardé
    if(yesterdayDone && streak===0) return state.streak;
    return streak;
  })();

  // 9. Bonus hebdo
  const restMode = state.restMode||false;
  const walkDef = objs.find(o=>o.id==="walk");
  // En mode blessure : walk passe de bonus daily → hebdo avec objectif adapté
  const walkObj = restMode && walkDef ? (()=>{
    const walkTarget = walkTargetRef.current||state.walkTarget||0;
    return walkTarget>0
      ? {...walkDef, daily:false, weekly:true, optional:false, base:walkTarget}
      : null;
  })() : null;

  // Semaine validée si : course atteinte OU (restMode ET marche atteinte)
  const weeklyDone = (()=>{
    const ws=new Date(); ws.setDate(ws.getDate()-((ws.getDay()+6)%7)); ws.setHours(0,0,0,0);
    const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d.toISOString().slice(0,10);});
    if(days.some(d=>d>today))return false;
    const dailyOk=reqDailyObjs.every(o=>days.every(d=>activeOn(d).indexOf(o)<0||(state.dailyLog[d]?.[o.id]||0)>=getRankBase(o.id,ri,prestige)));
    if(!dailyOk)return false;
    const runBase=getRankBase("run",ri,prestige);
    const runDone=wLog["run"]||0;
    if(runDone>=runBase)return true;
    if(restMode&&walkObj){
      // Crédit course = km marche × 2
      const walkDone=wLog["walk"]||0;
      const runCredit=walkDone*2;
      return (runDone+runCredit)>=runBase || walkDone>=walkObj.base;
    }
    return false;
  })();

  // 10. Quete speciale
  const now         = Date.now();
  const sqs         = state.specialQuests||[];
  const activeSq    = sqs.find(q=>!q.completedAt&&now<q.expiresAt)||null;
  const completedSq = sqs.find(q=>q.completedAt&&(now-q.completedAt)<86400000)||null;

  // Flags bonus
  const bonusGiven       = state.streakBonusDay===today;
  const weeklyBonusGiven = state.weeklyBonusWk===wk;
  const missedDays       = (()=>{
    if(!state.lastActiveDay)return 0;
    const d=Math.round((new Date(today)-new Date(state.lastActiveDay))/86400000);
    return d>1?d:0;
  })();
  // Bandeau pénalité hier incomplet
  const yesterdayIncomplete = (()=>{
    if(state.penaltyDay!==today)return false;
    const d=new Date(today);d.setDate(d.getDate()-1);
    const yk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const yLog=state.dailyLog[yk]||{};
    const reqObjs=(state.objectives||DEFS).filter(o=>!o.optional&&o.daily&&(!o.startDate||o.startDate<=yk));
    return Object.keys(yLog).length>0&&!reqObjs.every(o=>(yLog[o.id]||0)>=o.base);
  })();

  // ─── EFFECTS ──────────────────────────────────────────────────────────

  // Couleur CSS du rang
  useEffect(()=>{
    const r=document.documentElement.style;
    r.setProperty("--rc",rank.color); r.setProperty("--rg",rank.glow);
    r.setProperty("--ra",rank.accent);
  },[rank.id]);

  // Sync streak
  useEffect(()=>{
    if(computedStreak!==state.streak)setState(s=>({...s,streak:computedStreak}));
  },[computedStreak]);

  // Bonus streak + increment streak au moment ou toutes les quetes sont faites
  const STREAK_MILESTONES={5:50,10:100,25:250,50:500,100:1000};
  useEffect(()=>{
    if(!allDailyDone)return;
    setState(s=>{
      const t=todayStr();
      let next={...s};
      if(s.lastStreakDay!==t)next={...next,lastStreakDay:t};
      if(s.streakBonusDay!==t){
        const sx={...next.statXp,Discipline:(next.statXp.Discipline||0)+100};
        next={...next,totalXp:next.totalXp+100,statXp:sx,stats:{...next.stats,Discipline:getLvl(sx.Discipline)},streakBonusDay:t};
        // Vérifier milestone streak
        const newStreak=next.streak;
        const milestoneXp=STREAK_MILESTONES[newStreak];
        const milestones=next.streakMilestones||[];
        if(milestoneXp&&!milestones.includes(newStreak)){
          const sx2={...sx,Discipline:(sx.Discipline||0)+milestoneXp};
          next={...next,totalXp:next.totalXp+milestoneXp,statXp:sx2,stats:{...next.stats,Discipline:getLvl(sx2.Discipline)},streakMilestones:[...milestones,newStreak]};
          setTimeout(()=>{
            const id1=Date.now()+Math.random(),id2=id1+0.1;
            setFloats(f=>[...f,{id:id1,y:"30%",txt:"\uD83C\uDFC6 MILESTONE "+newStreak+" JOURS !"},{id:id2,y:"35%",txt:"+"+milestoneXp+" XP Discipline"}]);
            setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id1&&p.id!==id2)),2000);
          },600);
        } else {
          setTimeout(()=>{
            const id1=Date.now()+Math.random(),id2=id1+0.1;
            setFloats(f=>[...f,{id:id1,y:"35%",txt:"\uD83D\uDD25 STREAK BONUS !"},{id:id2,y:"40%",txt:"+100 XP Discipline"}]);
            setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id1&&p.id!==id2)),1400);
          },300);
        }
      }
      return next;
    });
  },[allDailyDone]);

  // Bonus hebdo

  // ─── ACTIONS ──────────────────────────────────────────────────────────

  function spawnFloat(txt,e){
    const id=Date.now()+Math.random();
    setFloats(f=>[...f,{id,txt}]);
    setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id)),2300);
  }

  function addXp(amount,stat,e,silent){
    setState(s=>{
      const nt=s.totalXp+amount;
      const sx={...s.statXp,[stat]:(s.statXp[stat]||0)+amount};
      const rk=getRank(s.totalXp), nrk=getNext(rk.id);
      if(nrk&&getRank(nt).id!==rk.id)setTimeout(()=>setRankUp(getRank(nt)),100);
      return {...s,totalXp:nt,statXp:sx,stats:{...s.stats,[stat]:getLvl(sx[stat])},lastActiveDay:todayStr()};
    });
    if(e&&!silent)spawnFloat("+"+Math.round(amount)+"xp",e);
  }

  function validate(obj,e){
    if(e){e.preventDefault();e.stopPropagation();}
    const el=document.getElementById("qi_"+obj.id);
    const raw=(inputs.current[obj.id]||"").toString().replace(",",".");
    const val=parseFloat(raw); if(!val||val<=0)return;
    inputs.current[obj.id]="";
    if(el){el.value="";setTimeout(()=>{try{el.focus();}catch(_){}},50);}
    const cur=obj.weekly?(wLog[obj.id]||0):(tLog[obj.id]||0);
    let xp=0;
    if(obj.binary){const was=cur>=getRankBase(obj.id,ri,prestige),now2=(cur+val)>=getRankBase(obj.id,ri,prestige); xp=(!was&&now2)?(obj.binaryXp||50):0;}
    else{const nt=cur+val; const b=getRankBase(obj.id,ri,prestige); if(cur>=b)xp=val*obj.xpPer*1.5; else if(nt<=b)xp=val*obj.xpPer; else{const n=b-cur; xp=n*obj.xpPer+(val-n)*obj.xpPer*1.5;}}
    setState(s=>{
      if(obj.weekly){const w={...s.weeklyLog};w[wk]={...(w[wk]||{}),[obj.id]:(w[wk]?.[obj.id]||0)+val};return{...s,weeklyLog:w,lastActiveDay:todayStr()};}
      const d={...s.dailyLog};d[today]={...(d[today]||{}),[obj.id]:(d[today]?.[obj.id]||0)+val};return{...s,dailyLog:d,lastActiveDay:todayStr()};
    });
    if(xp>0)addXp(xp,obj.stat,e); else if(obj.binary)spawnFloat("0 XP",e);
  }

  function progressSq(sq,e){
    const el=document.getElementById("sqi_"+sq.sqid); if(!el)return;
    const raw=el.value.toString().replace(",","."); el.value="";
    const val=parseFloat(raw); if(!val||val<=0)return;
    const newProg=Math.min(sq.target,sq.progress+val);
    const wasComplete=sq.progress>=sq.target;
    const nowComplete=newProg>=sq.target;
    // XP uniquement à la complétion totale
    if(!wasComplete&&nowComplete){
      addXp(sq.xp,sq.stat,null,true);
      const id1=Date.now()+Math.random();
      const id2=id1+0.1;
      setFloats(f=>[...f,
        {id:id1,y:"35%",txt:"\uD83C\uDFC6 QU\u00c9TE VALID\u00c9E !"},
        {id:id2,y:"40%",txt:"+"+sq.xp+" XP"}
      ]);
      setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id1&&p.id!==id2)),1400);
    }
    setState(s=>({...s,specialQuests:s.specialQuests.map(q=>q.sqid===sq.sqid?{...q,progress:newProg,completedAt:(nowComplete&&!wasComplete)?Date.now():q.completedAt}:q)}));
  }

  function launchNewSq(){
    const used=sqs.map(q=>q.id);
    const tpl=pickRandomSq(used); if(!tpl)return;
    const sq={...tpl,sqid:"sq_"+Date.now(),progress:0,startedAt:Date.now(),expiresAt:Date.now()+tpl.days*86400000,completedAt:null};
    setState(s=>({...s,specialQuests:[...s.specialQuests.filter(q=>q.completedAt),sq]}));
  }

  function fmtCD(ms){
    const d=Math.floor(ms/86400000),hh=Math.floor((ms%86400000)/3600000),mm=Math.floor((ms%3600000)/60000);
    if(d>0)return d+"j "+hh+"h"; if(hh>0)return hh+"h "+mm+"min"; return mm+"min";
  }

  // ─── SOUS-COMPOSANTS ──────────────────────────────────────────────────

  function QI({obj}){
    const t=obj.base&&!RANK_BASES[obj.id]?obj.base:getRankBase(obj.id,ri,prestige), d=obj.weekly?(wLog[obj.id]||0):(tLog[obj.id]||0);
    const done=obj.binary?(d>=1):(d>=t);

    // Quêtes binaires : boutons Échec / Succès
    if(obj.binary){
      function setBinary(val,e){
        const cur=obj.weekly?(wLog[obj.id]||0):(tLog[obj.id]||0);
        const wasD=cur>=1;
        const xp=(!wasD&&val>=1)?obj.binaryXp:0;
        const cx=e?e.clientX:200, cy=e?e.clientY:300;
        setState(s=>{
          const d2={...s.dailyLog};
          d2[today]={...(d2[today]||{}),[obj.id]:val};
          return {...s,dailyLog:d2,lastActiveDay:todayStr()};
        });
        if(xp>0){
          const id=Date.now()+Math.random();
          setFloats(f=>[...f,{id,x:cx,y:cy,txt:"+"+xp+"xp"}]);
          setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id)),1300);
          setState(s=>{
            const sx={...s.statXp,[obj.stat]:(s.statXp[obj.stat]||0)+xp};
            const st={...s.stats,[obj.stat]:getLvl(sx[obj.stat])};
            return {...s,totalXp:s.totalXp+xp,statXp:sx,stats:st,lastActiveDay:todayStr()};
          });
        }
      }
      const validated = tLog[obj.id] !== undefined;
      const failFlex = validated && !done ? 3 : 1;
      const succFlex = validated && done ? 3 : 1;
      return h("div",{class:"qi "+(done?"done":"")},
        h("div",{class:"qhdr"},
          h("div",{class:"qname"},h("span",null,obj.icon)," ",obj.name)
        ),
        h("div",{style:"display:flex;gap:8px;margin-top:8px"},
          h("button",{
            onClick:e=>setBinary(0,e),
            style:"flex:"+failFlex+";padding:"+(validated&&done?"6px 4px":"10px")+";border-radius:8px;border:1px solid "+(validated&&!done?"#ef4444":"#ef444433")+";background:"+(validated&&!done?"#ef444422":"rgba(255,255,255,0.02)")+";color:"+(validated&&!done?"#ef4444":"#ef444455")+";font-family:Orbitron,sans-serif;font-size:11px;cursor:pointer;letter-spacing:1px;transition:all .2s;white-space:nowrap;overflow:hidden"
          },"\u274C \u00c9chec"),
          h("button",{
            onClick:e=>setBinary(1,e),
            style:"flex:"+succFlex+";padding:"+(validated&&!done?"6px 4px":"10px")+";border-radius:8px;border:1px solid "+(validated&&done?"#4ade80":"#4ade8033")+";background:"+(validated&&done?"#4ade8022":"rgba(255,255,255,0.02)")+";color:"+(validated&&done?"#4ade80":"#4ade8055")+";font-family:Orbitron,sans-serif;font-size:11px;cursor:pointer;letter-spacing:1px;transition:all .2s;white-space:nowrap;overflow:hidden"
          },"\u2705 Succ\u00e8s")
        ),
        h("div",{style:"font-size:10px;color:var(--td);margin-top:6px;font-family:Orbitron,sans-serif"},
          obj.binaryXp+" XP si succ\u00e8s \u00b7 "+(STAT_LBL[obj.stat]||obj.stat)
        )
      );
    }

    const pct=(d/t)*100, over=d>t;
    return h("div",{class:"qi "+(obj.optional&&d>0?"done":"")},
      h("div",{class:"qhdr"},
        h("div",{class:"qname"},h("span",null,obj.icon)," ",obj.name)
      ),
      h("div",{class:"qrow"},
        obj.optional
          ? h("div",{style:"flex:1;display:flex;align-items:center;gap:6px"},
              h("div",{class:"qxp",style:"color:"+(d>0?"var(--rc)":"var(--td)")},d>0?d+" "+obj.unit+"/∞":"∞")
            )
          : h(Fragment,null,
              h("div",{class:"qbar"},h("div",{class:"qfill"+(over?" over":done?" done":""),style:"width:"+Math.min(100,pct)+"%"})),
              h("div",{class:"qxp"},d+"/"+t+" "+obj.unit)
            )
      ),
      h("div",{class:"qinrow"},
        h("input",{class:"qin",type:"text",inputMode:"decimal",placeholder:"+ "+obj.unit,id:"qi_"+obj.id,onInput:ev=>{inputs.current[obj.id]=ev.target.value;}}),
        h("button",{class:"qbtn",onClick:e=>{
          const el=document.getElementById("qi_"+obj.id);
          if(el)inputs.current[obj.id]=el.value;
          validate(obj,e);
          if(el)el.value="";
        }},"+XP")
      ),
      h("div",{style:"font-size:10px;color:var(--td);margin-top:4px;font-family:Orbitron,sans-serif"},
        obj.xpPer+" xp/"+obj.unit+" \u00b7 "+(STAT_LBL[obj.stat]||obj.stat)
      )
    );
  }

    );
  }

  function SqCard({sq,showInput}){
    const remaining=sq.expiresAt-now;
    const urgent=remaining<86400000&&!sq.completedAt;
    const pct=Math.min(100,(sq.progress/sq.target)*100);
    const done=sq.progress>=sq.target;

    function completeBinary(val,e){
      if(sq.progress>=sq.target)return;
      const nowComplete=val>=1;
      if(nowComplete){
        const id1=Date.now()+Math.random(), id2=id1+0.1;
        setFloats(f=>[...f,{id:id1,y:"35%",txt:"\uD83C\uDFC6 QU\u00c9TE VALID\u00c9E !"},{id:id2,y:"40%",txt:"+"+sq.xp+" XP"}]);
        setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id1&&p.id!==id2)),1400);
        addXp(sq.xp,sq.stat,null,true);
      }
      setState(s=>({...s,specialQuests:s.specialQuests.map(q=>q.sqid===sq.sqid
        ?{...q,progress:val,completedAt:nowComplete?Date.now():q.completedAt}:q)}));
    }

    return h("div",{class:"sqcard"+(urgent?" sq-urgent":"")},

            )
          :h("div",{class:"qinrow",style:"margin-top:8px"},

    const ws=getWS(wkOff);
    const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return localDate(d);});
    const wKey=wkStr(ws);
    const dt={};
    weekDays.forEach(dk=>Object.entries(state.dailyLog[dk]||{}).forEach(([id,v])=>{dt[id]=(dt[id]||0)+v;}));
    const tots={...dt,...(state.weeklyLog[wKey]||{})};
    const we=new Date(ws); we.setDate(ws.getDate()+6);
    const fmt=d=>d.getDate().toString().padStart(2,"0")+"/"+(d.getMonth()+1).toString().padStart(2,"0");
    const lbl=wkOff===0?"Cette semaine":wkOff===1?"Semaine derni\u00e8re":fmt(ws)+" \u2013 "+fmt(we);

    const last7lbls=last7.map(d=>["D","L","M","M","J","V","S"][new Date(d).getDay()]);

    // ── Records personnels (max par quête sur tout le dailyLog) ──
    const records={};
    Object.entries(state.dailyLog).forEach(([date,log])=>{
      Object.entries(log).forEach(([id,val])=>{
        if(!records[id]||val>records[id].val)records[id]={val,date};
      });
    });
    // weekly records
    Object.entries(state.weeklyLog).forEach(([wk,log])=>{
      Object.entries(log).forEach(([id,val])=>{
        if(!records[id]||val>records[id].val)records[id]={val,date:wk};
      });
    });

    // ── Suggestions intelligentes (quêtes bonus non faites depuis X jours) ──
    const suggestions=[];
    objs.filter(o=>o.optional&&o.daily&&!o.binary).forEach(o=>{
      let lastDone=null;
      for(let i=0;i<30;i++){
        const d=new Date();d.setDate(d.getDate()-i);

        suggestions.push({obj:o,days,msg,urgency});
      }

          const allDone=d===today

            :activeOn(d).every(o=>(log[o.id]||0)>0);
          const isPast=d<today;

            ?h("button",{class:"mbtn mdng",style:"width:100%",onClick:()=>setConfirmReset(true)},"R\u00e9initialiser toutes les donn\u00e9es")
            :h("div",null,
                h("div",{style:"font-size:13px;color:#ef4444;margin-bottom:12px;text-align:center"},"\u26A0\uFE0F Action irr\u00e9versible. Toute ta progression sera perdue."),
                h("div",{class:"mrow"},
                  h("button",{class:"mbtn mdng",style:"flex:1",onClick:()=>{localStorage.removeItem("sl_v3");setState({...IMPORTED,totalXp:0,streak:0,statXp:{Vitalite:0,Force:0,Esprit:0,Endurance:0,Discipline:0},stats:{Vitalite:0,Force:0,Esprit:0,Endurance:0,Discipline:0},dailyLog:{},weeklyLog:{},specialQuests:[]});setConfirmReset(false);setShowSet(false);}},"\u2705 Confirmer"),
                  h("button",{class:"mbtn mcan",style:"flex:1",onClick:()=>setConfirmReset(false)},"Annuler")
                )
              )
        )
      )
    );
  }

  // ─── ANIMATION RANK UP ────────────────────────────────────────────────

  function RankUp(){
    if(!rankUp)return null;
    const prevRankIdx=RANKS.findIndex(r=>r.id===rankUp.id)-1;
    const prevRank=prevRankIdx>=0?RANKS[prevRankIdx]:null;
    const particles=Array.from({length:40},(_,i)=>({
      id:i,
      left:Math.random()*100,
      delay:Math.random()*3,
      dur:1.2+Math.random()*2,
      size:2+Math.random()*4,
      cyan:Math.random()>0.7
    }));
    return h("div",{class:"ruov",style:"--rc:"+rankUp.color+";--rg:"+rankUp.glow},
      h("div",{class:"ruparts"},particles.map(p=>
        h("div",{key:p.id,class:"rupart",style:"left:"+p.left+"%;bottom:0;width:"+p.size+"px;height:"+p.size+"px;background:"+(p.cyan?"rgba(74,222,128,0.6)":rankUp.color)+";animation-delay:"+p.delay+"s;animation-duration:"+p.dur+"s"})
      )),
      h("div",{class:"rucont"},
        h("div",{class:"ruevol"},"\u00c9volution de rang"),
        h("div",{class:"rurank",style:"data-r:"+rankUp.id,"data-r":rankUp.id},rankUp.id),
        h("div",{class:"rulabel"},rankUp.label),
        h("button",{class:"rudis",onClick:()=>setRankUp(null)},"Continuer")
      )
    );
  }

  // ─── ANIMATION PRESTIGE ───────────────────────────────────────────────

  function PrestigeUp(){
    if(!prestigeUp)return null;
    const particles=Array.from({length:40},(_,i)=>({id:i,left:Math.random()*100,delay:Math.random()*3,dur:1.2+Math.random()*2,size:2+Math.random()*4}));
    const stars=Array.from({length:30},(_,i)=>({id:i,left:Math.random()*100,top:Math.random()*100,delay:Math.random()*4,dur:2+Math.random()*3}));
    return h("div",{class:"puov"},
      h("div",{class:"pubg",style:"pointer-events:none"}),
      h("div",{class:"pustars",style:"pointer-events:none"},stars.map(s=>h("div",{key:s.id,class:"pustar",style:"left:"+s.left+"%;top:"+s.top+"%;animation-delay:"+s.delay+"s;animation-duration:"+s.dur+"s"}))),
      h("div",{class:"puparts",style:"pointer-events:none"},particles.map(p=>h("div",{key:p.id,class:"pupart",style:"left:"+p.left+"%;bottom:0;width:"+p.size+"px;height:"+p.size+"px;background:"+(Math.random()>.6?"#c084fc":"#a855f7")+";animation-delay:"+p.delay+"s;animation-duration:"+p.dur+"s"}))),
      h("div",{class:"pucont"},
        h("div",{class:"puatom"},"\u269B\uFE0F"),
        h("div",{class:"pubadge"},"Ascension "+ROMAN[prestigeUp-1]),
        h("button",{class:"pudis",onClick:()=>setPrestigeUp(null)},"Continuer")
      ),
      h("div",{class:"puline",style:"pointer-events:none"})
    );
  }

  // ─── RENDU PRINCIPAL ──────────────────────────────────────────────────

  const parts=Array.from({length:15},(_,i)=>({id:i,s:Math.random()*3+1,l:Math.random()*100,dur:Math.random()*10+8,del:Math.random()*10}));
